<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - PDF Extractor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #f5f7fa; }
    .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-header { background: transparent; border-bottom: 1px solid #eee; font-weight: 600; }
    .form-label { font-weight: 500; font-size: 14px; }
    .form-text { font-size: 12px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <a href="{{ url_for('index') }}" class="navbar-brand"><i class="bi bi-arrow-left me-2"></i>Back</a>
    <span class="navbar-brand mb-0 h1"><i class="bi bi-gear me-2"></i>Settings</span>
  </div>
</nav>

<div class="container">
  <div class="card">
    <div class="card-header">Configuration (.env)</div>
    <div class="card-body">
      <p class="text-muted small mb-4">Changes apply after restarting the app. Credentials are stored in <code>.env</code> (not committed to git).</p>

      <form method="POST">
        <h6 class="section-title mt-3">OpenRouter</h6>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">API Key</label>
                    <input type="password" name="OPENROUTER_API_KEY" class="form-control" value="{{ settings.openrouter_api_key }}">
            <div class="form-text">Required for summarization.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Model</label>
                    <input type="text" name="OPENROUTER_MODEL" class="form-control" value="{{ settings.openrouter_model }}">
          </div>
        </div>

        <h6 class="section-title mt-4">SMTP (Email)</h6>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label">SMTP Host</label>
                    <input type="text" name="SMTP_HOST" class="form-control" value="{{ settings.smtp_host }}">
          </div>
          <div class="col-md-2">
            <label class="form-label">Port</label>
                    <input type="number" name="SMTP_PORT" class="form-control" value="{{ settings.smtp_port }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">User</label>
                    <input type="text" name="SMTP_USER" class="form-control" value="{{ settings.smtp_user }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Password</label>
                    <input type="password" name="SMTP_PASSWORD" class="form-control" value="{{ settings.smtp_password }}">
          </div>
        </div>

        <h6 class="section-title mt-4">Email Addresses</h6>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label">From</label>
                    <input type="email" name="EMAIL_FROM" class="form-control" value="{{ settings.email_from }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">To</label>
                    <input type="email" name="EMAIL_TO" class="form-control" value="{{ settings.email_to }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">CC</label>
                    <input type="email" name="EMAIL_CC" class="form-control" value="{{ settings.email_cc or '' }}">
          </div>
        </div>

        <hr class="my-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Save Settings</button>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
