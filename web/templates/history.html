<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report History - PDF Extractor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #f5f7fa; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1a1a2e; color: #e0e0e0; }
    body.dark .card { background: #16213e; color: #e0e0e0; }
    body.dark .card-header { border-color: #2a2a4a; color: #e0e0e0; }
    body.dark .navbar { background: #0f0f23; }
    body.dark .form-control, body.dark .form-select { background: #0f0f23; color: #e0e0e0; border-color: #2a2a4a; }
    body.dark .text-muted { color: #8899aa !important; }
    .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .report-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; transition: background 0.3s; }
    body.dark .report-item { background: #0f3460; }
    .report-item:hover { background: #e9ecef; }
    body.dark .report-item:hover { background: #1a4a7a; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    <span class="navbar-brand mb-0"><i class="bi bi-clock-history me-2"></i>Report History</span>
    <button class="btn btn-outline-light btn-sm" onclick="toggleDark()"><i class="bi bi-moon"></i></button>
  </div>
</nav>

<div class="container">
  {% if reports %}
    {% for r in reports %}
    <div class="report-item">
      <div>
        <i class="bi bi-file-earmark-text text-success me-2"></i>
        <strong>{{ r.name }}</strong>
        <small class="text-muted ms-2">{{ r.size }} KB - {{ r.created }}</small>
      </div>
      <div>
        <a href="{{ url_for('download', filename=r.name) }}" class="btn btn-sm btn-outline-success"><i class="bi bi-download"></i></a>
        <a href="{{ url_for('delete_report', filename=r.name) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this report?')"><i class="bi bi-trash"></i></a>
      </div>
    </div>
    {% endfor %}
  {% else %}
    <div class="text-center py-5 text-muted">
      <i class="bi bi-inbox" style="font-size:48px;"></i>
      <p class="mt-2">No reports generated yet.</p>
      <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">Go to Dashboard</a>
    </div>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
  }
  if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark');
</script>
</body>
</html>
